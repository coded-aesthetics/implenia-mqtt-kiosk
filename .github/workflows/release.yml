name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      # npm ci uses the lockfile which was generated on macOS and lacks
      # linux-specific optional deps (e.g. @rollup/rollup-linux-x64-gnu).
      # Using npm install ensures platform-appropriate binaries are resolved.
      - name: Install dependencies
        run: npm install

      - name: Build server
        run: npm run build -w server

      - name: Build UI
        run: npm run build -w ui

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version from tag into package.json files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" -w server
          npm pkg set version="$VERSION" -w ui

      - name: Create release archive
        run: |
          mkdir -p release-bundle/server/dist
          mkdir -p release-bundle/ui/dist
          cp -r server/dist/* release-bundle/server/dist/
          cp server/package.json release-bundle/server/
          cp -r ui/dist/* release-bundle/ui/dist/
          cp package.json release-bundle/
          cp .env.example release-bundle/
          cd release-bundle
          tar -czf "../app-v${{ steps.version.outputs.VERSION }}.tar.gz" .

      - name: Generate checksum
        run: sha256sum "app-v${{ steps.version.outputs.VERSION }}.tar.gz" > checksum.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-v${{ steps.version.outputs.VERSION }}.tar.gz
            checksum.sha256
