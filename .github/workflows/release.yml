name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      # The lockfile is generated on macOS and lacks linux-specific optional
      # deps (e.g. @rollup/rollup-linux-x64-gnu). Deleting it forces npm to
      # resolve platform-appropriate binaries fresh on the CI runner.
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build server
        run: npm run build -w server

      - name: Build UI
        run: npm run build -w ui

      - name: Smoke test server
        run: |
          MQTT_BROKER_URL=mqtt://127.0.0.1:1883 \
          MQTT_TOPICS=sensors/# \
          GITHUB_OWNER=test \
          GITHUB_REPO=test \
          PORT=3999 \
          node server/dist/index.js &
          SERVER_PID=$!
          # Wait for server to be ready (up to 10s)
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:3999/status > /dev/null 2>&1; then
              echo "Server responded on /status"
              kill $SERVER_PID
              exit 0
            fi
            sleep 0.5
          done
          echo "Server did not respond within 10s"
          kill $SERVER_PID 2>/dev/null
          exit 1

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version from tag into package.json files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" -w server
          npm pkg set version="$VERSION" -w ui

      - name: Create release archive
        run: |
          mkdir -p release-bundle/server/dist
          mkdir -p release-bundle/ui/dist
          cp -r server/dist/* release-bundle/server/dist/
          cp server/package.json release-bundle/server/
          cp -r ui/dist/* release-bundle/ui/dist/
          cp package.json release-bundle/
          cp .env.example release-bundle/
          cd release-bundle
          tar -czf "../app-v${{ steps.version.outputs.VERSION }}.tar.gz" .

      - name: Generate checksum
        run: sha256sum "app-v${{ steps.version.outputs.VERSION }}.tar.gz" > checksum.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-v${{ steps.version.outputs.VERSION }}.tar.gz
            checksum.sha256
