name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd ui && npm install
          cd ../server && npm install

      - name: Build server
        run: npm run build -w server

      - name: Build UI
        run: npm run build -w ui

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          mkdir -p release-bundle/server/dist
          mkdir -p release-bundle/ui/dist
          cp -r server/dist/* release-bundle/server/dist/
          cp server/package.json release-bundle/server/
          cp -r ui/dist/* release-bundle/ui/dist/
          cp package.json release-bundle/
          cp .env.example release-bundle/
          cd release-bundle
          tar -czf "../app-v${{ steps.version.outputs.VERSION }}.tar.gz" .

      - name: Generate checksum
        run: sha256sum "app-v${{ steps.version.outputs.VERSION }}.tar.gz" > checksum.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-v${{ steps.version.outputs.VERSION }}.tar.gz
            checksum.sha256
